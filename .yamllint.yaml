---
extends: default

rules:
    line-length:
        max: 200
        level: warning
    truthy:
        # GitHub Actions uses `on:` as a top-level key.
        allowed-values: ["true", "false", "on", "off"]
        check-keys: false
    indentation:
        spaces: 4
        indent-sequences: true
    comments:
        min-spaces-from-content: 1
    document-start:
        present: true
    braces:
        max-spaces-inside: 1
    brackets:
        max-spaces-inside: 1

ignore: |
    .git/
    node_modules/
    .claude/
