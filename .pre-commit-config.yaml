---
# Pre-commit hooks for this repo.
# Install once with: pre-commit install
# Run all hooks against the full tree: pre-commit run --all-files

default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: check-merge-conflict
          - id: check-yaml
            exclude: ^\.github/workflows/  # GitHub Actions has truthy `on:` keys
          - id: check-toml
          - id: check-added-large-files
            args: [--maxkb=500]
          - id: end-of-file-fixer
          - id: trailing-whitespace
            exclude: '\.age$'
          - id: mixed-line-ending
            args: [--fix=lf]

    - repo: https://github.com/scop/pre-commit-shfmt
      rev: v3.10.0-2
      hooks:
          - id: shfmt
            args: [-i=4, -ci, -bn, -d]
            # shfmt does not understand chezmoi template syntax ({{ ... }})
            # so .sh.tmpl files are linted by `make lint` (which strips templates first)
            # and explicitly NOT formatted here.
            exclude: '\.tmpl$'

    - repo: https://github.com/adrienverge/yamllint
      rev: v1.35.1
      hooks:
          - id: yamllint
            args: [-c=.yamllint.yaml]

    # markdownlint-cli2 runs against the brew-installed binary (declared in Brewfile.tmpl)
    # rather than pre-commit's bundled node env, which can carry a stale node version
    # that breaks newer markdownlint releases (Cannot find module 'node:path').

    - repo: https://github.com/gitleaks/gitleaks
      rev: v8.21.2
      hooks:
          - id: gitleaks

    - repo: local
      hooks:
          # ShellCheck for both .sh and .sh.tmpl (template-aware via Makefile).
          - id: shellcheck-via-make
            name: shellcheck (via make lint)
            entry: make lint
            language: system
            pass_filenames: false
            files: '\.(sh|sh\.tmpl)$|^executable_'

          # Quick single-render template validation (full matrix runs in CI).
          - id: chezmoi-execute-template
            name: chezmoi execute-template (single render)
            entry: make verify-templates-quick
            language: system
            pass_filenames: false
            files: '\.tmpl$'

          - id: markdownlint-cli2
            name: markdownlint-cli2 (system)
            entry: markdownlint-cli2
            language: system
            files: '\.md$'

          # Existing GitGuardian secret scanning — preserves prior pre-commit hook behavior.
          - id: ggshield
            name: ggshield secret scan
            entry: bash -c 'command -v ggshield >/dev/null && ggshield secret scan pre-commit "$@" || exit 0' --
            language: system
            pass_filenames: false
            stages: [pre-commit]
