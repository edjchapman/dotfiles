name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run make lint
        run: make lint

  validate-templates:
    name: Validate chezmoi templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Validate templates via chezmoi init (dry-run)
        run: |
          mkdir -p /tmp/chezmoi-ci
          cat > /tmp/chezmoi-ci/chezmoi.toml <<'EOF'
          [data]
              machine_type = "personal"
              gpg_signing_key = "test"
          EOF
          chezmoi init --source="$(pwd)" \
            --config-path=/tmp/chezmoi-ci/chezmoi.toml \
            --dry-run