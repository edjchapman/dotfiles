name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run make lint
        run: make lint

  validate-templates:
    name: Validate chezmoi templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Validate template syntax
        run: |
          failed=0
          for tmpl in $(find . -name '*.tmpl' -not -path './.git/*' -not -name '.chezmoi.toml.tmpl'); do
            echo "Validating $tmpl..."
            chezmoi execute-template \
              --source="$(pwd)" \
              --init \
              --promptChoice machine_type=personal \
              --promptString gpg_signing_key=test \
              < "$tmpl" > /dev/null || failed=1
          done
          exit $failed