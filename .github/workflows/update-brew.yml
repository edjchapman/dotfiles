---
name: Weekly brew update

on:
    schedule:
        - cron: '0 9 * * 1'  # Mondays 09:00 UTC
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    check-outdated:
        name: brew outdated → draft PR
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install chezmoi
              run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

            - name: Render Brewfile (personal) and detect outdated
              id: outdated
              run: |
                  chezmoi execute-template \
                      --init --source="$(pwd)" \
                      --override-data '{"machine_type":"personal","gpg_signing_key":""}' \
                      < Brewfile.tmpl > /tmp/Brewfile.rendered
                  echo "::group::Rendered Brewfile"
                  cat /tmp/Brewfile.rendered
                  echo "::endgroup::"
                  brew update >/dev/null
                  outdated=$(brew bundle list --file=/tmp/Brewfile.rendered --formula 2>/dev/null \
                      | xargs -I{} brew info --json=v2 {} 2>/dev/null \
                      | jq -r '.formulae[]? | select(.versions.stable != .installed[0].version) | "\(.name): \(.installed[0].version // "n/a") → \(.versions.stable)"' \
                      || true)
                  if [ -z "$outdated" ]; then
                      echo "no_updates=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "no_updates=false" >> "$GITHUB_OUTPUT"
                      {
                          echo "outdated<<EOF"
                          echo "$outdated"
                          echo "EOF"
                      } >> "$GITHUB_OUTPUT"
                  fi

            - name: Write update report
              if: steps.outdated.outputs.no_updates == 'false'
              run: |
                  cat > .github/brew-outdated-report.md <<'EOF'
                  # Brew outdated report

                  Generated by `.github/workflows/update-brew.yml` on $(date -u +'%Y-%m-%d').

                  ## Outdated formulae

                  ```
                  ${{ steps.outdated.outputs.outdated }}
                  ```

                  Review and bump pinned versions in `Brewfile.tmpl` if any are pinned to specific versions. Most formulae in the Brewfile are unpinned (latest stable), so a normal `brew bundle install` will pick these up automatically — this PR exists as a heads-up, not a required bump.
                  EOF

            - name: Create draft PR
              if: steps.outdated.outputs.no_updates == 'false'
              uses: peter-evans/create-pull-request@v6
              with:
                  branch: chore/weekly-brew-update
                  delete-branch: true
                  draft: true
                  commit-message: "chore: weekly brew outdated report"
                  title: "chore: weekly brew outdated report"
                  body: |
                      Automated weekly report of outdated Homebrew formulae against the rendered `Brewfile.tmpl`.

                      ${{ steps.outdated.outputs.outdated }}

                      No automatic bumps — review and adjust `Brewfile.tmpl` manually if needed.
                  add-paths: |
                      .github/brew-outdated-report.md
